name: Sync to Hugging Face Space

# Se deja manual por defecto para evitar fallos en GitHub Actions
# si todavía no configuraste HF_TOKEN o el repo de Hugging Face.
# Cuando tengas el Space creado, reemplaza HF_USERNAME por tu usuario
# y, si quieres despliegue automático, vuelve a activar el bloque push.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: HF_USERNAME/attentionlab-ai
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
          space_sdk: docker
