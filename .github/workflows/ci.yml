name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  docs:
    name: Documentación
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Validar whitespace
        run: git diff --check

      - name: Validar formato documental
        run: |
          if grep -RIn \
            --exclude-dir=node_modules \
            --exclude-dir=.venv \
            --exclude-dir=.atencion \
            --exclude-dir=.git \
            --exclude-dir=dist \
            --exclude-dir=__pycache__ \
            "====\|—\|–" \
            README.md docs packages/shared-contracts/openapi-notes.md; then
            echo "Documentación con separadores o guiones no permitidos."
            exit 1
          fi

  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r apps/api/requirements.txt
          python -m pip install -r apps/api/requirements-dev.txt

      - name: Ejecutar pruebas backend
        run: PYTHONPATH=apps/api python -m pytest apps/api/tests -q

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Instalar dependencias frontend
        run: npm --prefix apps/web ci --include=dev

      - name: Validar frontend
        run: npm --prefix apps/web run check

  hf-space:
    name: Hugging Face Space
    runs-on: ubuntu-latest
    if: ${{ vars.HF_SPACE_URL != '' }}
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Validar Space público
        run: HF_SPACE_URL="${{ vars.HF_SPACE_URL }}" bash scripts/validate-hf-space.sh
