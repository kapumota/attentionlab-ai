services:
  attentio-ai-lab:
    build: .
    image: attentio-ai-lab:v1.1.0-dev
    ports:
      - "7860:7860"
    environment:
      PORT: "7860"
      ATTENTIONLAB_STATIC_DIR: /app/static
      ATTENTIONLAB_ENABLE_REAL_MODELS: "false"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7860/api/health', timeout=4).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
